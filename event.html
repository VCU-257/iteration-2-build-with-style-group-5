<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Confirmation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container-fluid vh-100 d-flex flex-column p-0">

    <!-- Top bar -->
    <div class="bg-light border-bottom text-center py-3">
      <h5 class="mb-0">Event Confirmation</h5>
    </div>

    <!-- Content -->
    <div class="flex-grow-1 overflow-auto p-3 pb-5 mb-5">
      <div class="card">
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Bio</label>
            <input type="text" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Time</label>
            <input type="time" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">People</label>
            <select class="form-select">
              <option selected></option>
              <option>1</option>
              <option>2</option>
              <option>3+</option>
            </select>
          </div>
          <a href="calendar.html" class="btn btn-primary">Confirm</a>
        </div>
      </div>
    </div>

    <!-- Nav bar -->
    <div class="border-top bg-light fixed-bottom">
      <div class="row g-0 text-center">
        <div class="col">
          <a href="homepage.html" class="btn btn-light w-100 rounded-0 py-3">Home</a>
        </div>
        <div class="col">
          <a href="calendar.html" class="btn btn-light w-100 rounded-0 py-3 fw-bold">Calendar</a>
        </div>
        <div class="col">
          <a href="messages.html" class="btn btn-light w-100 rounded-0 py-3">Messages</a>
        </div>
        <div class="col">
          <a href="profile.html" class="btn btn-light w-100 rounded-0 py-3">Profile</a>
        </div>
        <div class="col">
          <a href="settings.html" class="btn btn-light w-100 rounded-0 py-3">Settings</a>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
