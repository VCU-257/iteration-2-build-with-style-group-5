<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotocate - Profile</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

  <div class="container-fluid vh-100 d-flex flex-column p-0">

    <!-- Top bar -->
    <div id="profileTitleBanner" class="bg-light border-bottom text-center py-3">
      <h5 class="mb-0">Profile</h5>
    </div>

    <!-- Profile content -->
    <div class="flex-grow-1 overflow-auto p-3 pb-5 mb-5">
      <div class="card">
        <div class="card-body">
          <div class="row align-items-center">
            
            <!-- Profile picture area -->
            <div class="col-4 col-md-3">
              <div class="border d-flex align-items-center justify-content-center" style="width: 150px; height: 150px;">
                <span>Profile Picture</span>
              </div>
            </div>

            <!-- Profile info area -->
            <div class="col-8 col-md-9">
              <p class="mb-2"><strong>First Name:</strong> [First Name]</p>
              <p class="mb-2"><strong>Last Name:</strong> [Last Name]</p>
              <p class="mb-0"><strong>Current Grade:</strong> C+</p>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Nav bar -->
    <div class="border-top bg-light fixed-bottom">
      <div class="row g-0 text-center">
        <div class="col">
          <a href="homepage.html" class="btn btn-light w-100 rounded-0 py-3 bottom-nav-link"><i class="bi bi-house-door-fill me-1"></i>Home</a>
        </div>
        <div class="col">
          <a href="calendar.html" class="btn btn-light w-100 rounded-0 py-3 bottom-nav-link"><i class="bi bi-calendar me-1"></i>Calendar</a>
        </div>
        <div class="col">
          <a href="messages.html" class="btn btn-light w-100 rounded-0 py-3 bottom-nav-link"><i class="bi bi-camera me-1"></i>Messages</a>
        </div>
        <div class="col">
          <a href="profile.html" class="btn btn-light w-100 rounded-0 py-3 fw-bold bottom-nav-link"><i class="bi bi-person-square me-1"></i>Profile</a>
        </div>
        <div class="col">
          <a href="settings.html" class="btn btn-light w-100 rounded-0 py-3 bottom-nav-link">Settings</a>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
