<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotocate</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <div class="container-fluid vh-100 d-flex flex-column p-0">

    <div class="bg-light border-bottom text-center py-3">
        <h5 class="mb-0" id="currentDate"></h5>
    </div>

    <!-- Weekly event boxes -->
    <!-- Weekly event boxes -->
    <div class="flex-grow-1 overflow-auto p-3 pb-5 mb-5" id="weekContainer">
    </div>

    <!-- Nav-bar buttons -->
    <div class="border-top bg-light fixed-bottom">
        <div class="row g-0 text-center">
            <div class="col">
                <a href="homepage.html" class="btn btn-light w-100 rounded-0 py-3 fw-bold">Home</a>
            </div>
            <div class="col">
                <a href="calendar.html" class="btn btn-light w-100 rounded-0 py-3">Calendar</a>
            </div>
            <div class="col">
                <a href="messages.html" class="btn btn-light w-100 rounded-0 py-3">Messages</a>
            </div>
            <div class="col">
                <a href="profile.html" class="btn btn-light w-100 rounded-0 py-3">Profile</a>
            </div>
            <div class="col">
                <a href="settings.html" class="btn btn-light w-100 rounded-0 py-3">Settings</a>
            </div>
        </div>

    </div>
</div>

    <script>
        const CURRENT_USER = 'Avery';
        const FRIEND_EVENTS = [
            { name: 'Doctor Appointment', dateStr: 'April 13, 2026', timeStr: '2:00 PM - 3:00 PM', owner: 'Jonathan', participants: ['Jonathan'] },
            { name: 'Study Group', dateStr: 'April 13, 2026', timeStr: '4:00 PM - 5:30 PM', owner: 'Sarah', participants: ['Sarah', 'Jonathan'] },
            { name: "Jonathan's Lunch", dateStr: 'April 13, 2026', timeStr: '12:00 PM - 1:00 PM', owner: 'Jonathan', participants: ['Jonathan'] },
            { name: "Sarah's Class", dateStr: 'April 13, 2026', timeStr: '2:00 PM - 3:30 PM', owner: 'Sarah', participants: ['Sarah'] }
        ];
        const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

        function updateDate() {
            const today = new Date();
            const format = today.toLocaleDateString("en-US", { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById("currentDate").textContent = format;
        }
        updateDate();
        setInterval(updateDate, 60000);

        function formatDateKey(date) {
            // Returns "April 13, 2026" style to match localStorage keys
            return date.toLocaleDateString("en-US", { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function buildWeek() {
            const container = document.getElementById('weekContainer');
            const today = new Date();
            // Find Sunday of the current week
            const sunday = new Date(today);
            sunday.setDate(today.getDate() - today.getDay());

            const saved = JSON.parse(localStorage.getItem('calendarEvents') || '[]');
            const visibleFriendEvents = FRIEND_EVENTS.filter(evt =>
                Array.isArray(evt.participants) && evt.participants.includes(CURRENT_USER)
            );
            const allVisibleEvents = saved.concat(visibleFriendEvents);

            for (let i = 0; i < 7; i++) {
                const day = new Date(sunday);
                day.setDate(sunday.getDate() + i);
                const dateKey = formatDateKey(day);
                const isToday = day.toDateString() === today.toDateString();

                const dayEvents = allVisibleEvents.filter(e => e.dateStr === dateKey);

                let eventsHTML = '';
                if (dayEvents.length === 0) {
                    eventsHTML = '<p class="text-muted mb-0 small">No events.</p>';
                } else {
                    eventsHTML = dayEvents.map(e =>
                        `<a href="calendar.html?focusDate=${encodeURIComponent(dateKey)}" class="d-block mb-1 text-decoration-none">
                            <span class="badge bg-warning text-dark me-1">${e.name}</span>
                            <small class="text-muted">${e.timeStr}${e.desc ? ' - ' + e.desc : ''}</small>
                        </a>`
                    ).join('');
                }

                const card = document.createElement('div');
                card.className = 'card mb-3' + (isToday ? ' border-primary' : '');
                card.innerHTML = `
                    <div class="card-body">
                        <h5 class="card-title${isToday ? ' text-primary' : ''}">${DAY_NAMES[i]} <small class="text-muted fs-6">${dateKey}</small></h5>
                        ${eventsHTML}
                    </div>`;
                container.appendChild(card);
            }
        }
        buildWeek();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
